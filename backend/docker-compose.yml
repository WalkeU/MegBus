# Explicit projektnév + konténernevek, hogy `docker ps` alapján egyértelműen
# megkülönböztethető legyen egy másik, esetleg szintén "backend" nevű mappában
# futó, teljesen független projekttől ezen a gépen.
name: megbus-backend

services:
  backend:
    container_name: megbus-backend
    build: .
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    # Csak localhostról elérhető port — ha a szerveren már fut egy saját
    # reverse proxy (nginx, más Caddy stb.), az ezen keresztül éri el a
    # backendet, és ilyenkor a lenti `caddy` service-t el sem indítod
    # (lásd README "Saját reverse proxy mögé" szakasza).
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    container_name: megbus-caddy
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
