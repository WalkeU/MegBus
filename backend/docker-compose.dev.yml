# Fejlesztői compose: nincs Caddy/TLS, a forráskód bind mountként van bekötve,
# így a konténeren belüli `tsx watch` azonnal újraindul, ha módosítasz egy
# .ts fájlt a gépeden. Indítás: docker compose -f docker-compose.dev.yml up --build
#
# A DEV_PORT env változóval állítható, melyik host-porton érd el (alapértelmezett
# 3001, hogy ne ütközzön egy esetleges másik, 3000-en futó szolgáltatással).
#
# Explicit projektnév + konténernév, hogy `docker ps` alapján egyértelműen
# megkülönböztethető legyen egy másik, esetleg szintén "backend" nevű mappában
# futó, teljesen független projekttől ezen a gépen.
name: megbus-backend-dev

services:
  backend:
    container_name: megbus-backend-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      # macOS/Windows Docker Desktop bind mountnál az inotify események nem mindig
      # jutnak el a konténerbe — polling nélkül a tsx watch nem venné észre a
      # hoszton történő fájlmódosítást.
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    ports:
      - "${DEV_PORT:-3001}:3000"
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./package.json:/app/package.json:ro
    command: npm run dev
